spring:
  application:
    name: ai-passage-creator
  profiles:
    active: local
  datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/ai_passage_creator
      username: root
      password: 123456
    # session 配置
  session:
      store-type: redis
      # session 30 天过期
      timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
server:
  port: 8567
  servlet:
    context-path: /api
      # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-flex:
   configuration:
     map-underscore-to-camel-case: false


# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.example.aipassagecreator.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn